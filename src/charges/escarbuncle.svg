<svg xmlns="http://www.w3.org/2000/svg" stroke="#000" viewBox="50 50 200 200">
  <metadata author="heraldric-coat-of-arms" license="https://creativecommons.org/publicdomain/zero/1.0"/>
  <g id="escarbuncle" stroke-width="1.1" stroke-linejoin="round">
    <!-- eight rays (cross + saltire) -->
    <g stroke-width="1">
      <rect x="96" y="54" width="8" height="92" rx="2"/>
      <rect x="54" y="96" width="92" height="8" rx="2"/>
      <g transform="rotate(45 100 100)"><rect x="96" y="54" width="8" height="92" rx="2"/></g>
      <g transform="rotate(-45 100 100)"><rect x="96" y="54" width="8" height="92" rx="2"/></g>
    </g>
    <!-- fleur-ish terminals -->
    <g stroke-width="0.8">
      <circle cx="100" cy="52" r="7"/><circle cx="100" cy="148" r="7"/><circle cx="52" cy="100" r="7"/><circle cx="148" cy="100" r="7"/>
      <circle cx="66" cy="66" r="6.5"/><circle cx="134" cy="134" r="6.5"/><circle cx="134" cy="66" r="6.5"/><circle cx="66" cy="134" r="6.5"/>
    </g>
    <!-- emerald centre (vert) -->
    <circle class="secondary" cx="100" cy="100" r="13"/>
  </g>
</svg>
